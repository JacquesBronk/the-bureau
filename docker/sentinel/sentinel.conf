# Required for Docker: keep hostnames as-is instead of resolving to IPs at
# config load time. Without this, Redis 7 fails with "Can't resolve instance
# hostname" during config parse before Docker DNS is fully ready.
sentinel resolve-hostnames yes
sentinel announce-hostnames yes

sentinel monitor bureau-master redis-master 6379 2
sentinel down-after-milliseconds bureau-master 5000
sentinel failover-timeout bureau-master 10000
sentinel parallel-syncs bureau-master 1
