apiVersion: v1
kind: Service
metadata:
  name: {{ include "the-bureau.engine.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "the-bureau.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "the-bureau.engine.selectorLabels" . | nindent 4 }}
  {{- if eq .Values.service.sessionAffinity "ClientIP" }}
  # Pin each worker's session to one engine pod (matters when replicas > 1).
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: {{ .Values.service.sessionAffinityTimeoutSeconds }}
  {{- end }}
  ports:
    - name: mcp
      port: {{ .Values.service.port }}
      targetPort: mcp
      protocol: TCP
