{{- if .Values.rbac.create -}}
{{- $workerNs := include "the-bureau.workerNamespace" . -}}
# The engine ServiceAccount is the only component allowed to create worker Jobs.
# Scoped to the worker namespace: it manages Jobs, reads Pods/logs, manages the
# per-Job token Secrets it mints, and creates the ephemeral Pods + ClusterIP
# Services backing the test-service broker.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "the-bureau.engine.fullname" . }}-runner
  namespace: {{ $workerNs }}
  labels:
    {{- include "the-bureau.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "the-bureau.engine.fullname" . }}-runner
  namespace: {{ $workerNs }}
  labels:
    {{- include "the-bureau.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "the-bureau.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "the-bureau.engine.fullname" . }}-runner
  apiGroup: rbac.authorization.k8s.io
{{- end }}
