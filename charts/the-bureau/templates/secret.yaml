{{- /* Chart-managed Secret holding any credentials provided inline in values.
        Anything referenced via *.existingSecret is used as-is and not duplicated here. */ -}}
{{- $data := dict -}}
{{- if and (not .Values.auth.signingKey.existingSecret) .Values.auth.signingKey.value -}}
{{- $_ := set $data "signing-key" (.Values.auth.signingKey.value | b64enc) -}}
{{- end -}}
{{- if and (not .Values.model.oauthToken.existingSecret) .Values.model.oauthToken.value -}}
{{- $_ := set $data "oauth-token" (.Values.model.oauthToken.value | b64enc) -}}
{{- end -}}
{{- if and (not .Values.model.gatewayKey.existingSecret) .Values.model.gatewayKey.value -}}
{{- $_ := set $data "gateway-key" (.Values.model.gatewayKey.value | b64enc) -}}
{{- end -}}
{{- if and .Values.git.enabled (not .Values.git.token.existingSecret) .Values.git.token.value -}}
{{- $_ := set $data "token" (.Values.git.token.value | b64enc) -}}
{{- end -}}
{{- if and (not .Values.redis.existingSecret) .Values.redis.url -}}
{{- $_ := set $data "redis-url" (.Values.redis.url | b64enc) -}}
{{- end -}}
{{- if $data -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "the-bureau.engine.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "the-bureau.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $k, $v := $data }}
  {{ $k }}: {{ $v }}
  {{- end }}
{{- end }}
