name: Release

# Publishes the npm package (npmjs.org) and the container images (GitHub
# Container Registry) for a tagged release.
#
# Trigger by pushing a semver tag that matches package.json's version:
#   npm version patch    # bumps package.json + creates the tag
#   git push --follow-tags
# or run manually via workflow_dispatch with an explicit version.
#
# Required repository secret:
#   NPM_TOKEN  — an npmjs.org automation token with publish rights to `the-bureau`
# (GHCR uses the built-in GITHUB_TOKEN — no secret needed.)
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, without the leading v (e.g. 0.7.82)"
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm-publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC token for npm Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22   # Trusted Publishing needs Node >= 22.14
          registry-url: https://registry.npmjs.org
      - name: Resolve version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$V" >> "$GITHUB_ENV"
      - name: Verify tag matches package.json
        run: |
          PKG="$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$VERSION" ]; then
            echo "::error::package.json version ($PKG) != release version ($VERSION)"
            exit 1
          fi
      - run: npm ci
      - run: npm run build
      # Trusted Publishing (OIDC) needs npm >= 11.5.1; the runner ships an older npm.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest
      # No token: npm authenticates via the GitHub Actions OIDC token (id-token: write).
      # Provenance is attached automatically under Trusted Publishing, so no --provenance flag.
      - name: Publish (Trusted Publishing / OIDC)
        run: npm publish --access public

  images:
    name: Build & push images (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Resolve version + owner
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$V" >> "$GITHUB_ENV"
          echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - name: Build engine bundle
        run: |
          npm ci
          npm run build   # the engine image COPYs dist/mcp-server.bundle.cjs
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Engine image
        run: |
          docker buildx build -f docker/engine/Dockerfile \
            -t ghcr.io/$OWNER/bureau-engine:$VERSION \
            -t ghcr.io/$OWNER/bureau-engine:latest \
            --push .
      - name: Worker base image
        run: |
          docker buildx build -f docker/worker/Dockerfile.base \
            -t ghcr.io/$OWNER/bureau-worker-base:$VERSION \
            --push .
      - name: Worker (node) image
        run: |
          docker buildx build -f docker/worker/Dockerfile.node \
            --build-arg BASE_IMAGE=ghcr.io/$OWNER/bureau-worker-base:$VERSION \
            -t ghcr.io/$OWNER/bureau-worker:$VERSION \
            -t ghcr.io/$OWNER/bureau-worker:latest \
            --push .
      - name: Worker (python) image
        run: |
          docker buildx build -f docker/worker/Dockerfile.python \
            --build-arg BASE_IMAGE=ghcr.io/$OWNER/bureau-worker-base:$VERSION \
            -t ghcr.io/$OWNER/bureau-worker-python:$VERSION \
            -t ghcr.io/$OWNER/bureau-worker-python:latest \
            --push .
      - name: Worker (dotnet) image
        run: |
          docker buildx build -f docker/worker/Dockerfile.dotnet \
            --build-arg BASE_IMAGE=ghcr.io/$OWNER/bureau-worker-base:$VERSION \
            -t ghcr.io/$OWNER/bureau-worker-dotnet:$VERSION \
            -t ghcr.io/$OWNER/bureau-worker-dotnet:latest \
            --push .
