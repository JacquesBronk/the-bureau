networks:
  telemetry:
    driver: bridge

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ['--config=/etc/otel-collector-config.yml']
    volumes:
      - ./docker/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - '4317:4317'   # OTLP gRPC
      - '4318:4318'   # OTLP HTTP
      - '8889:8889'   # Prometheus metrics endpoint (scraped by prometheus service)
      - '13133:13133' # health_check extension HTTP API
    networks:
      - telemetry
    # The collector image is distroless (no shell/wget).
    # Health is verified via pollUntilHealthy() in tests/telemetry/integration/setup.ts,
    # which polls http://127.0.0.1:13133/ from outside the container.

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - '16686:16686' # Jaeger UI + query HTTP API
    networks:
      - telemetry
    healthcheck:
      test: ['CMD-SHELL', 'wget --quiet --tries=1 --spider http://localhost:16686/ || exit 1']
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'   # Prometheus query API + UI
    networks:
      - telemetry
    healthcheck:
      test: ['CMD-SHELL', 'wget --quiet --tries=1 --spider http://localhost:9090/-/healthy || exit 1']
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
